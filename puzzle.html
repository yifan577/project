<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Image Puzzle</title>
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/image-puzzle.css" rel="stylesheet" />
    <script src="js/jquery-2.1.1.min.js"></script>
    <script src="js/jquery-ui.js"></script>
    <script src="js/image-puzzle.js"></script>
</head>
<body>
    <div id="collage">
        <h2>拼图游戏</h2>
        <hr />
        <div id="playPanel" style="padding:5px;display:none;">
            <h3 id="imgTitle"></h3> <hr />
            <div style="display:inline-block; margin:auto; width:95%; vertical-align:top;">
                <div id="puzzleColumn">
                    <ul id="sortable" class="sortable"></ul>
                    <div id="gameControls">
                        <button id="undoBtn" type="button" title="撤销上一步" disabled>↶ 撤销</button>
                        <button id="resetBtn" type="button" title="重置当前局" disabled>↻ 重置</button>
                    </div>
                </div>
                <div id="actualImageBox">
                    <div id="stepBox">
                        <div>步数:</div><div class="stepCount">0</div>
                    </div>
                    <div id="timeBox">
                        时间: <span id="timerPanel"></span> S
                    </div>
                    <img id="actualImage" />
                    <div>原图长这样</div>
                    <p id="levelPanel">
                        <input type="radio" name="level" id="Easy" checked="checked" value="3" /> <label for="easy">简单</label>
                        <input type="radio" name="level" id="Medium" value="4" /> <label for="medium">中等</label>
                        <input type="radio" name="level" id="Hard" value="5" /> <label for="hard">困难</label>
                    </p>
                    <div style="background:#fff;border-radius:6px;padding:8px 10px;margin-top:8px;font-size:12px;text-align:left;">
                        <b>最佳记录</b>
                        <div id="bestPanel" style="margin-top:4px;line-height:1.6;"></div>
                    </div>
                    <div>
                        <button id="newPhoto" type="button" class="btn">另一张</button>
                   </div>
                </div>
            </div>
        </div>
        <div id="gameOver" style="display:none;">
            <div style="background-color: #fc9e9e; padding: 5px 10px 20px 10px; text-align: center; ">
                <h2 style="text-align:center">Game Over!!</h2>
                Congratulations!! <br /> You have completed this picture.
                <br />
                Steps: <span class="stepCount">0</span> steps.
                <br />
               Time Taken: <span class="timeCount">0</span> seconds<br />
                <div>
                    <button type="button" onclick="window.location.reload(true);">再来一次</button>
                </div>
            </div>
        </div>

        <script>
            var images = [
                { src: 'images/london-bridge.jpg', title: '伦敦桥' },
                { src: 'images/lotus-temple.jpg', title: '莲花寺' },
                { src: 'images/qutub-minar.jpg', title: '顧特卜塔' },
                { src: 'images/statue-of-liberty.jpg', title: '自由女神像' },
                { src: 'images/taj-mahal.jpg', title: '泰姬瑪哈陵' }
            ];

            $(function () {
                var gridSize = $('#levelPanel :radio:checked').val();
                imagePuzzle.startGame(images, gridSize);
                $('#newPhoto').click(function () {
                    var gridSize = $('#levelPanel :radio:checked').val();  // Take the updated gridSize from UI.
                    imagePuzzle.startGame(images, gridSize);
                });

                $('#levelPanel :radio').change(function (e) {
                    var gridSize = $(this).val();
                    imagePuzzle.startGame(images, gridSize);
                });

                $('#undoBtn').click(function () {
                    imagePuzzle.undoMove();
                });

                $('#resetBtn').click(function () {
                    imagePuzzle.resetGame();
                });
            });
            function rules() {
                alert('Re arrange the image parts in a way that it correctly forms the picture. \nThe no. of steps taken will be counted.');
            }
            function about() {
                alert('Developed by Anurag Gandhi. \nHe can be contacted at: soft.gandhi@gmail.com');
            }
        </script>
    </div>
</body>
</html>
